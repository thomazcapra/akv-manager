<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Keyvault Console — Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  // Tailwind Play CDN, themed to the design tokens. Preflight is OFF so the
  // hand-authored component layer in styles.css stays authoritative.
  tailwind.config = {
    corePlugins: { preflight: false },
    theme: {
      extend: {
        colors: {
          ink: '#0A0D14', 'ink-2': '#0C1019',
          panel: '#121826', 'panel-2': '#0E141F', raise: '#171F2E',
          line: '#222C3E', 'line-2': '#1A2233',
          text: '#E6EBF2', muted: '#79859B', faint: '#4C586E',
          azure: '#5B9DFF', azure2: '#3F86F0',
          ok: '#46D6B4', warn: '#F2B53D', alert: '#FF5C6C', violet: '#A98BFF',
        },
        fontFamily: {
          sans: ['"IBM Plex Sans"', 'system-ui', 'sans-serif'],
          mono: ['"IBM Plex Mono"', 'ui-monospace', 'monospace'],
        },
      },
    },
  };
</script>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="grid min-h-screen grid-cols-[236px_1fr] max-[900px]:grid-cols-1">
  <aside>
    <div class="brand">
      <svg class="mark" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1.5" y="1.5" width="31" height="31" rx="8" fill="#0E141F" stroke="#2A3954"/>
        <rect x="1.5" y="1.5" width="31" height="31" rx="8" stroke="url(#g)" stroke-opacity=".6"/>
        <circle cx="17" cy="15" r="4.4" stroke="#5B9DFF" stroke-width="1.8"/>
        <path d="M17 19.2V24" stroke="#5B9DFF" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M14.4 24h5.2" stroke="#46D6B4" stroke-width="1.8" stroke-linecap="round"/>
        <defs><linearGradient id="g" x1="0" y1="0" x2="34" y2="34">
          <stop stop-color="#5B9DFF"/><stop offset="1" stop-color="#46D6B4"/></linearGradient></defs>
      </svg>
      <div class="wm">KEYVAULT<small>OPS CONSOLE</small></div>
    </div>

    <button class="navpin" id="cmdkBtn" style="margin:2px 0 6px;border:1px solid var(--line);justify-content:flex-start">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <span class="pn">Search everything</span><kbd class="mono" style="font-size:9.5px;color:var(--faint)">⌘K</kbd>
    </button>

    <div class="navlabel">Operate</div>
    <nav>
      <button data-view="dashboard" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard</button>
      <button data-view="vaults">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
        Key Vaults</button>
      <button data-view="expiry">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
        Expiry</button>
    </nav>

    <div class="navlabel" id="pinLabel">Pinned</div>
    <div class="navpins" id="navPins"></div>
    <div class="navlabel" id="recentLabel">Recent</div>
    <div class="navpins" id="navRecent"></div>

    <div class="acct">
      <button class="acctbtn" id="acctBtn">
        <span class="dot" id="acctDot" style="background:var(--faint)"></span>
        <span style="overflow:hidden"><b id="acctUser">connecting…</b><br><span class="mono faint" id="acctSub" style="font-size:10.5px"></span></span>
        <svg class="chev" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
      </button>
      <div class="ver mono faint" id="ver"></div>
    </div>
  </aside>

  <main class="max-w-[1560px] px-8 pt-[26px] pb-[60px] max-[900px]:p-5">
    <div class="banner" id="banner"></div>

    <div class="flex items-end justify-between gap-[18px] mb-[26px]">
      <div id="headblock">
        <div class="eyebrow" id="eyebrow">Operations</div>
        <h1 id="title">Dashboard</h1>
        <div class="sub" id="subtitle">Live view of your Azure access via the local az CLI</div>
      </div>
      <div class="row" id="topactions">
        <input class="search hide" id="search" placeholder="search vault · resource group · tag…" />
        <button class="btn ghost" id="refresh">↻ Refresh</button>
      </div>
    </div>

    <div id="route"></div>
  </main>
</div>

<!-- Command palette -->
<div class="cmdk-ov" id="cmdkOv">
  <div class="cmdk" role="dialog" aria-label="Command palette">
    <div class="cmdk-in">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="cmdkIn" placeholder="Jump to a vault, a view, or an action…" autocomplete="off" spellcheck="false">
      <kbd>esc</kbd>
    </div>
    <div class="cmdk-list" id="cmdkList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const api = async (p, opts) => { const r = await fetch(p, opts); return r.json(); };
let STATE = { vaults: [], subs: [], account: null, env: 'all', q: '', sort: 'name', dir: 1,
              kind: 'secrets', drawerVault: null, route: 'dashboard', facets: {} };
let CFG = { envRules: null, title: null, version: null, protectedTags: [] };
function tagMatch(p,k){ p=String(p).toLowerCase(); k=String(k).toLowerCase(); return p.endsWith('*')?k.startsWith(p.slice(0,-1)):k===p; }
function isProtectedTag(k){ return (CFG.protectedTags||[]).some(p=>tagMatch(p,k)); }
const SUBMETA = {};

// ---------- local prefs (pins / recents) ----------
const LS = {
  read(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch{ return []; } },
  write(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch{} },
};
const pins = () => LS.read('akv.pins');
const recents = () => LS.read('akv.recents');
const isPinned = n => pins().includes(n);
function togglePin(n){ const p=pins(); const i=p.indexOf(n); if(i>=0)p.splice(i,1); else p.unshift(n); LS.write('akv.pins',p); renderSidebar(); refreshCurrent(); }
function pushRecent(n){ const r=recents().filter(x=>x!==n); r.unshift(n); LS.write('akv.recents', r.slice(0,8)); renderSidebar(); }

function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1600); }
function copy(text){ navigator.clipboard.writeText(text).then(()=>toast('Copied to clipboard')); }
function banner(msg){ const b=$('#banner'); if(!msg){b.classList.remove('show');return;} b.innerHTML=msg; b.classList.add('show'); }
function envOf(id){ return (SUBMETA[id]&&SUBMETA[id].env)||'?'; }
function subName(id){ return (SUBMETA[id]&&SUBMETA[id].name)||id; }
const findVault = n => STATE.vaults.find(v=>v.name.toLowerCase()===String(n||'').toLowerCase());

// ---------- environment + service derivation (now tag-aware) ----------
function prettyEnv(s){
  const x=String(s).toLowerCase().trim();
  // exact short codes commonly used in `env` tags
  const code={dv:'Dev',dev:'Dev',d:'Dev',qa:'QA',ts:'Test',tst:'Test',tes:'Test',t:'Test',
    st:'Stage',stg:'Stage',stag:'Stage',uat:'Stage',pp:'Stage',pr:'Prod',prd:'Prod',prod:'Prod',p:'Prod',
    sb:'Sandbox',sbx:'Sandbox',sand:'Sandbox'}[x];
  if(code) return code;
  if(/prod|prd|\blive\b/.test(x)) return 'Prod';
  if(/stag|stg|\buat\b|preprod|pre-prod|accept/.test(x)) return 'Stage';
  if(/\bqa\b|quality/.test(x)) return 'QA';
  if(/sandbox|sbx|\bdemo\b/.test(x)) return 'Sandbox';
  if(/dev|develop/.test(x)) return 'Dev';
  if(/test|tst|\bint\b|integration|nonprod/.test(x)) return 'Test';
  return s.charAt(0).toUpperCase()+s.slice(1);
}
// Prefer the vault's real `env` tag; fall back to the subscription-name heuristic.
function vaultEnv(v){
  const t = v.tags||{};
  const raw = t.env || t.Environment || t.environment || t.ENV || t.Env;
  return raw ? prettyEnv(raw) : envOf(v.subscriptionId);
}
function vaultService(v){
  const t = v.tags||{};
  return t.solution || t.Solution || t.application || t.app || serviceOf(v.resourceGroup);
}
function envLabel(name){
  const n = name || '';
  if(CFG.envRules){ for(const [pat,label] of CFG.envRules){ try{ if(new RegExp(pat,'i').test(n)) return label; }catch{} } }
  // Only label a subscription when a known environment keyword is present; otherwise '—'.
  return /(prod|prd|\blive\b|stag|stg|\buat\b|preprod|pre-prod|accept|\bqa\b|sandbox|sbx|\bdemo\b|\bdev\b|develop|test|tst|\bint\b|integration|nonprod)/i.test(n)
    ? prettyEnv(n) : '—';
}
function envClass(env){
  const s = (env||'').toLowerCase();
  if(/prod|live/.test(s)) return 'e-prod';
  if(/stag|uat|preprod/.test(s)) return 'e-stage';
  if(/qa/.test(s)) return 'e-qa';
  if(/sandbox|demo/.test(s)) return 'e-sandbox';
  if(/dev/.test(s)) return 'e-dev';
  if(/test|int/.test(s)) return 'e-test';
  return 'e-other';
}
function serviceOf(rg){ return (rg||'').replace(/^rg[-_]?/i,'').replace(/[-_]?\d+$/,'') || rg; }

// ---------- bootstrap ----------
async function boot(){
  const cfg = await api('/api/config'); if(cfg.ok){ CFG = {...CFG, ...cfg.data};
    if(CFG.title){ document.title = CFG.title; const wm=document.querySelector('.brand .wm'); if(wm) wm.firstChild.textContent = CFG.title; } }
  $('#ver').textContent = 'akv-manager v' + (CFG.version || '?');
  const acc = await api('/api/account');
  if(!acc.ok){
    $('#acctUser').textContent = 'not connected'; $('#acctDot').style.background='var(--alert)';
    const detail = acc.error ? `<div class="hint" style="margin-top:6px">${esc(acc.error)}</div>` : '';
    banner((acc.needLogin
      ? 'Azure CLI is signed out. Run <code>az login</code>, then press Refresh.'
      : 'Could not reach the Azure CLI. Make sure <code>az</code> is installed and on your PATH (on Windows it is <code>az.cmd</code>), then press Refresh.') + detail);
    return;
  }
  STATE.account = acc.data;
  $('#acctDot').style.background='var(--ok)';
  $('#acctUser').textContent = acc.data.user.name;
  $('#acctSub').textContent = acc.data.name;
  banner('');
  await loadSubs();
  await loadVaults();
  renderSidebar();
  router();
  kickExpiryScan();   // warm the dashboard's lifecycle numbers in the background
}

async function loadSubs(){
  const r = await api('/api/subscriptions');
  if(!r.ok) return;
  STATE.subs = r.data;
  r.data.forEach(s => SUBMETA[s.id] = { name: s.name, env: envLabel(s.name) });
}
async function loadVaults(refresh){
  const r = await api('/api/vaults'+(refresh?'?refresh=1':''));
  if(!r.ok){ STATE.vaults=[]; return r; }
  STATE.vaults = r.data.map(v => ({...v, env: vaultEnv(v), service: vaultService(v)}));
  return r;
}

// ---------- router ----------
function parseHash(){
  return location.hash.replace(/^#\/?/,'').split('/').filter(Boolean).map(decodeURIComponent);
}
function navigate(path){ location.hash = '#/'+path; }
const META = {
  dashboard:['Operations','Dashboard','Secrets and certificates that need attention, your pinned vaults, and access health.'],
  vaults:['Inventory','Key Vaults','Every readable vault across your subscriptions. Filter by environment and tags; open one to manage it.'],
  expiry:['Lifecycle','Expiring soon','Secrets and certificates that are expired or approaching expiry across every vault you can read.'],
  settings:['Account','Account & subscriptions','Your Azure identity and the subscription the console is pointed at.'],
};
let mountedVault = null;
function setHead(view){
  const onVault = view==='vault';
  $('#headblock').style.display = onVault ? 'none' : '';
  $('#search').classList.toggle('hide', onVault);
  if(!onVault && META[view]){ $('#eyebrow').textContent=META[view][0]; $('#title').textContent=META[view][1]; $('#subtitle').textContent=META[view][2]; }
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active', b.dataset.view===view));
}
function router(){
  if(!STATE.account) return;
  const parts = parseHash();
  const route = parts[0]||'dashboard';
  STATE.route = route;
  if(route!=='vault') mountedVault=null;
  if(route==='vaults'){ setHead('vaults'); viewVaults(); }
  else if(route==='vault'){ setHead('vault'); viewVault(parts[1], parts[2]||'secrets'); }
  else if(route==='expiry'){ setHead('expiry'); viewExpiry(); }
  else if(route==='settings'){ setHead('settings'); viewSettings(); }
  else { setHead('dashboard'); viewDashboard(); }
  renderSidebar();
}
function refreshCurrent(){ if(STATE.account) router(); }
window.addEventListener('hashchange', router);

// ---------- sidebar pinned / recent ----------
function renderSidebar(){
  const parts = parseHash(); const curVault = parts[0]==='vault'?(parts[1]||'').toLowerCase():null;
  const tile = n => {
    const v = findVault(n); const env = v?envClass(v.env):'e-other';
    return `<button class="navpin ${curVault===n.toLowerCase()?'active':''}" onclick="openVault('${esc(n)}')" title="${esc(n)}">
      <span class="env-dot" style="background:var(--azure)"></span><span class="pn">${esc(n)}</span></button>`;
  };
  const p = pins();
  $('#navPins').innerHTML = p.length ? p.map(tile).join('') : '<div class="navempty">Pin vaults you manage often</div>';
  $('#pinLabel').style.display = '';
  const r = recents().filter(n=>!p.includes(n));
  $('#recentLabel').style.display = r.length? '' : 'none';
  $('#navRecent').innerHTML = r.map(tile).join('');
}

// ---------- DASHBOARD ----------
function viewDashboard(){
  const sevOf = e => e.expired?'alert':(e.soon?'warn':'azure');
  const exp = EXP.scanned ? expCounts() : null;
  const denied = EXP.stats ? EXP.stats.forbidden : null;
  const card = (k,v,sub,sev,onclick,icon) =>
    `<button class="actcard sev-${sev}" onclick="${onclick}"><div class="k">${icon||''}${k}</div>
       <div class="v">${v}</div><div class="sub">${sub}</div></button>`;
  const clock = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';
  const lock = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>';
  const grid = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>';
  const scanning = EXP.polling || (!EXP.scanned);
  const dim = scanning ? '<span class="spin" style="width:13px;height:13px;border-width:2px"></span>' : '';
  const cards = [
    card('Expired', exp? exp.expired : dim, 'needs rotation now', exp&&exp.expired?'alert':'ok', "navigate('expiry')", clock),
    card('≤ 7 days', exp? exp.soon : dim, 'rotate this week', exp&&exp.soon?'warn':'ok', "navigate('expiry')", clock),
    card('≤ 30 days', exp? exp.month : dim, 'plan ahead', exp&&exp.month?'azure':'ok', "navigate('expiry')", clock),
    card('Key Vaults', STATE.vaults.length, `${denied!=null?denied+' you cannot read':'across '+envCount()+' environments'}`, 'azure', "navigate('vaults')", grid),
  ];
  const tileRow = n => {
    const v = findVault(n); if(!v) return '';
    return `<div class="vtile" onclick="openVault('${esc(n)}')">
      <button class="star ${isPinned(n)?'':'off'}" onclick="event.stopPropagation();togglePin('${esc(n)}')" title="pin">★</button>
      <span class="nm">${esc(n)}</span>
      <span class="tag ${envClass(v.env)}">${esc(v.env)}</span>
      <span class="rg mono">${esc(v.resourceGroup)}</span></div>`;
  };
  const p = pins().filter(findVault), rec = recents().filter(n=>!p.includes(n)&&findVault(n));
  $('#route').innerHTML = `
    <div class="actcards">${cards.join('')}</div>
    <div class="dashgrid">
      <div>
        <div class="secthead2"><span class="eyebrow">Pinned vaults</span>
          <button class="iconbtn" onclick="navigate('vaults')">All vaults →</button></div>
        <div class="vtiles">${p.length? p.map(tileRow).join('') : `<div class="empty" style="padding:30px">Open any vault and press ★ to pin it here for one-click access.</div>`}</div>
      </div>
      <div>
        <div class="secthead2"><span class="eyebrow">Recently opened</span>
          ${EXP.scannedAt?`<span class="tablenote">expiry scanned ${new Date(EXP.scannedAt).toLocaleTimeString()}</span>`:''}</div>
        <div class="vtiles">${rec.length? rec.map(tileRow).join('') : `<div class="empty" style="padding:30px">Vaults you open will appear here.</div>`}</div>
      </div>
    </div>`;
}
function envCount(){ const s=new Set(STATE.vaults.map(v=>v.env).filter(e=>e&&e!=='—'&&e!=='?')); return s.size; }
function expCounts(){
  const items = EXP.allItems||[];
  return {
    expired: items.filter(i=>i.daysLeft<0).length,
    soon: items.filter(i=>i.daysLeft>=0&&i.daysLeft<=7).length,
    month: items.filter(i=>i.daysLeft>=0&&i.daysLeft<=30).length,
  };
}

// ---------- VAULTS (inventory) ----------
const FACET_PREF = ['solution','cost-center','contact-main','contact-ccoe','owner','roles'];
const isEnvKey = k => /^(env|environment)$/i.test(k);
// Pick up to 4 tag dimensions to expose as dropdown facets: preferred keys first
// (case-insensitive match to the real tag casing), then the most common remaining keys.
function facetKeys(){
  const freq = {};
  STATE.vaults.forEach(v=>Object.keys(v.tags||{}).forEach(k=>{ if(!isEnvKey(k)) freq[k]=(freq[k]||0)+1; }));
  const real = Object.keys(freq);
  const matchPref = p => real.find(k=>k.toLowerCase()===p);
  const picked = [];
  for(const p of FACET_PREF){ const k=matchPref(p); if(k && !picked.includes(k)) picked.push(k); }
  for(const [k] of Object.entries(freq).sort((a,b)=>b[1]-a[1])){ if(picked.length>=4) break; if(!picked.includes(k)) picked.push(k); }
  return picked.slice(0,4);
}
function tagVal(v,k){ const t=v.tags||{}; return t[k]!=null?String(t[k]):''; }
function filteredVaults(){
  const q = STATE.q.toLowerCase();
  let list = STATE.vaults.filter(v=>{
    if(STATE.env!=='all' && v.env!==STATE.env) return false;
    for(const [k,val] of Object.entries(STATE.facets)){ if(val && tagVal(v,k)!==val) return false; }
    if(q){
      const hay = [v.name, v.resourceGroup, v.service, ...Object.values(v.tags||{})].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  const k=STATE.sort, d=STATE.dir;
  list.sort((a,b)=>{ if(k==='pin'){ return ((isPinned(b.name)?1:0)-(isPinned(a.name)?1:0))*d || a.name.localeCompare(b.name); }
    return String(a[k]||'').localeCompare(String(b[k]||''))*d; });
  return list;
}
function viewVaults(){
  if(!STATE.vaults.length){
    $('#route').innerHTML = `<div class="panel"><div class="empty"><span class="spin"></span> querying Resource Graph…</div></div>`;
    loadVaults().then(()=>{ if(STATE.route==='vaults') viewVaults(); });
    return;
  }
  const envs = {}; STATE.vaults.forEach(v=>envs[v.env]=(envs[v.env]||0)+1);
  const order = ['all',...Object.keys(envs).sort()];
  const chips = order.map(e=>{ const n=e==='all'?STATE.vaults.length:envs[e];
    return `<div class="chip ${STATE.env===e?'active':''}" onclick="setEnv('${esc(e)}')">${e==='all'?'All environments':esc(e)}<span class="n">${n}</span></div>`; }).join('');
  const fkeys = facetKeys();
  const facets = fkeys.map(k=>{
    const vals=[...new Set(STATE.vaults.map(v=>tagVal(v,k)).filter(Boolean))].sort();
    if(!vals.length) return '';
    const sel=STATE.facets[k]||'';
    return `<div class="facet"><label>${esc(k)}</label>
      <select class="facetsel ${sel?'on':''}" onchange="setFacet('${esc(k)}',this.value)">
        <option value="">any</option>${vals.map(x=>`<option ${x===sel?'selected':''} value="${esc(x)}">${esc(x)}</option>`).join('')}</select></div>`;
  }).join('');
  const anyFacet = Object.values(STATE.facets).some(Boolean);
  $('#route').innerHTML = `
    <div class="chips">${chips}</div>
    ${facets?`<div class="facets">${facets}${anyFacet?`<button class="facetclear" onclick="clearFacets()">clear filters</button>`:''}</div>`:''}
    <div class="panel"><div class="scroll"><table>
      <thead><tr>
        <th data-sort="pin" style="width:30px"></th>
        <th data-sort="name">Vault</th><th data-sort="env">Env</th>
        <th data-sort="service">Service</th><th>Tags</th><th data-sort="resourceGroup">Resource Group</th>
        <th data-sort="sku">SKU</th><th>Auth</th><th class="right">Actions</th>
      </tr></thead><tbody id="vaultsBody"></tbody>
    </table></div></div>
    <div class="tablenote" id="vaultCount"></div>`;
  document.querySelectorAll('th[data-sort]').forEach(th=>th.onclick=()=>{ const k=th.dataset.sort; STATE.dir=STATE.sort===k?-STATE.dir:1; STATE.sort=k; renderVaultRows(); });
  renderVaultRows();
}

async function batchEditValues(){

  const multiline = vals.filter(v=>v.ok && v.val.includes('\n')).map(v=>v.n);

function toggleSel(nm){ DRW.sel.has(nm)?DRW.sel.delete(nm):DRW.sel.add(nm); renderDrawerList(); }

function closeCreate(){ const el=$('#dCreate'); if(el){ el.classList.add('hide'); el.innerHTML=''; } renderBatchBar(); }
async function submitCreate(mode){
  const msg=$('#cMsg');
  const expRaw=$('#cExp').value;
  const expires = expRaw ? new Date(expRaw+'T00:00:00Z').toISOString() : undefined;
  let items=[];
  if(mode==='single'){
    const name=$('#cName').value.trim(), value=$('#cVal').value;
    if(!/^[A-Za-z0-9-]+$/.test(name)){ msg.textContent='Invalid name — use letters, digits, hyphen'; return; }
    if(!value.length){ msg.textContent='Value is required'; return; }
    items=[{name,value}];
  } else {
    const lines=$('#cBatch').value.split('\n').map(l=>l.trim()).filter(Boolean);
    const bad=[];
    for(const ln of lines){
      const m=ln.match(/^([^=:]+)[=:]([\s\S]*)$/);
      const name=m?m[1].trim():'', value=m?m[2].trim():'';
      if(!m || !/^[A-Za-z0-9-]+$/.test(name) || !value.length){ bad.push(ln); continue; }
      items.push({name,value});
    }
    if(bad.length){ msg.textContent=`${bad.length} invalid line(s) — each must be "name = value" (name: letters/digits/hyphen)`; return; }
    if(!items.length){ msg.textContent='Add at least one name = value line'; return; }
  }
  msg.textContent='creating…';
  const r=await api(`/api/vaults/${DRW.vault}/secrets-create`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items, expires})});
  if(!r.ok){ msg.textContent=r.error||'failed'; return; }
  const ok=r.results.filter(x=>x.ok).length, fail=r.results.length-ok;
  toast(`Created ${ok} secret${ok!==1?'s':''}${fail?`, ${fail} failed`:''}`);
  if(fail){ const f=r.results.filter(x=>!x.ok);
    banner(`Create: ${ok} ok, ${fail} failed (${f.slice(0,3).map(x=>esc(x.name+': '+x.error)).join('; ')}${fail>3?'…':''}).`);
    setTimeout(()=>banner(''),9000); }
  closeCreate(); setTimeout(loadKind, 350);
}
function toggleEdit(nm){

  if(!el.classList.contains('hide')){ el.classList.add('hide'); el.innerHTML=''; return; }
  const it=DRW.items.find(x=>x.name===nm)||{};
  const cert = DRW.kind==='certificates';
  const exp = it.expires?it.expires.slice(0,10):'';
  el.innerHTML = `
    <div class="fld"><label>Enabled</label><label class="toggle"><input type="checkbox" id="edEn-${esc(nm)}" ${it.enabled?'checked':''}> ${it.enabled?'enabled':'disabled'}</label></div>
    ${cert
      ? `<div class="fld"><label>Expires</label><span class="hint">${exp||'—'} · set by the certificate, not editable here</span></div>`
      : `<div class="fld"><label>Expires</label><input type="date" id="edExp-${esc(nm)}" value="${exp}"><button class="iconbtn" onclick="document.getElementById('edExp-${CSS.escape(nm)}').value=''">clear</button></div>
         <div class="fld"><label>Value</label><input type="text" id="edVal-${esc(nm)}" placeholder="loading current value…"></div>

      <button class="btn sm ghost" onclick="toggleEdit('${esc(nm)}')">Cancel</button>

  el.classList.remove('hide');
  if(!cert){
    api(`/api/vaults/${DRW.vault}/secrets/${nm}/value`).then(r=>{

      if(r.ok){ live.value=r.data.value||''; live.dataset.orig=r.data.value||''; live.placeholder='secret value'; }
      else { live.placeholder = r.forbidden?'no permission to read current value':'could not load value'; }
    });
  }
}
async function saveEdit(nm){
  const msg=$('#edMsg-'+CSS.escape(nm)); msg.textContent='saving…';
  const v=DRW.vault, cert=DRW.kind==='certificates';
  const enabled = $('#edEn-'+CSS.escape(nm)).checked;
  let r;
  if(cert){
    r = await api(`/api/vaults/${v}/certificates/${nm}`, {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled})});
  } else {
    const expEl=$('#edExp-'+CSS.escape(nm)), valEl=$('#edVal-'+CSS.escape(nm));
    const expires = expEl.value? new Date(expEl.value+'T00:00:00Z').toISOString() : undefined;
    const value = valEl.value;
    const orig = valEl.dataset.orig ?? '';
    const valueChanged = value.length>0 && value!==orig;
    if(valueChanged){
      r = await api(`/api/vaults/${v}/secrets/${nm}`, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({value, enabled, expires})});
    } else {
      r = await api(`/api/vaults/${v}/secrets/${nm}`, {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled, expires})});
    }
  }
  if(!r.ok){ msg.textContent = r.forbidden?'🔒 no write permission':(r.error||'failed'); return; }
  msg.textContent='saved ✓'; toast('Updated '+nm);
  setTimeout(loadKind, 350);
}
async function batchApply(action){
  const names=[...DRW.sel]; if(!names.length) return;
  let op, verb;
  if(action==='enable'){ op={enabled:true}; verb='Enable'; }
  else if(action==='disable'){ op={enabled:false}; verb='Disable'; }
  else if(action==='expiry'){
    const d=$('#batchExp').value; if(!d){ toast('Pick a date first'); return; }
    op={expires:new Date(d+'T00:00:00Z').toISOString()}; verb='Set expiry '+d+' on';
  }
  if(!confirm(`${verb} ${names.length} ${DRW.kind} in ${DRW.vault}?`)) return;
  const kind = DRW.kind==='certificates'?'certificate':'secret';
  const items = names.map(n=>({vault:DRW.vault, kind, name:n}));
  toast('Applying to '+names.length+'…');
  const r = await api('/api/batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({op, items})});
  if(!r.ok){ toast(r.error||'batch failed'); return; }
  const ok=r.results.filter(x=>x.ok).length, fail=r.results.length-ok;
  toast(`${ok} updated${fail?`, ${fail} failed`:''}`);
  if(fail){ const failed=r.results.filter(x=>!x.ok); console.warn('Batch failures:', failed);
    banner(`Batch: ${ok} updated, ${fail} failed (${failed.slice(0,3).map(f=>esc(f.name+': '+f.error)).join('; ')}${fail>3?'…':''}). See console for all.`);
    setTimeout(()=>banner(''),8000); }
  DRW.sel.clear(); if($('#dSelAll'))$('#dSelAll').checked=false;
  setTimeout(loadKind, 350);
}
async function reveal(name){
  const box = document.getElementById('rv-'+name); if(!box) return;
  if(!box.classList.contains('hide')){ box.classList.add('hide'); box.innerHTML=''; return; }
  box.classList.remove('hide'); box.innerHTML = '<span class="spin"></span>';
  const r = await api(`/api/vaults/${DRW.vault}/secrets/${name}/value`);
  if(!r.ok){ box.innerHTML = `<span class="muted mono">${r.firewall?'🚫 blocked by vault firewall — connect to VPN':r.forbidden?'🔒 no permission':esc(r.error)}</span>`; return; }
  const val = r.data.value || '';
  box.innerHTML = `<code class="val" title="click to select">${esc(val)}</code><button class="iconbtn" onclick='copy(${JSON.stringify(val)})'>⧉</button>`;
}

async function saveTags(name){
  const msg=$('#tagMsg'); const tags={};
  let bad=false, protectedName=null, dupe=null;
  $('#tagRows').querySelectorAll('.tagrow').forEach(r=>{
    const k=r.querySelector('.tk').value.trim(), val=r.querySelector('.tv').value;
    if(!k) return;
    if(k.length>512 || val.length>256) bad=true;
    if(isProtectedTag(k)) protectedName=k;
    if(k in tags) dupe=k;
    tags[k]=val;
  });
  if(bad){ msg.textContent='tag name ≤512 / value ≤256 chars'; return; }
  if(dupe){ msg.textContent=`duplicate tag name "${dupe}"`; return; }
  if(protectedName){ msg.textContent=`"${protectedName}" is a default/protected tag name — choose another`; return; }
  if(Object.keys(tags).length>50){ msg.textContent='too many tags (max 50)'; return; }
  msg.textContent='saving…';
  const r=await api(`/api/vaults/${name}/tags`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({tags})});
  if(!r.ok){ msg.textContent = r.forbidden?'🔒 no permission to edit tags (needs Contributor / Tag Contributor)':(r.error||'failed'); return; }
  const v=findVault(name); if(v){ v.tags=r.data.tags||tags; v.env=vaultEnv(v); v.service=vaultService(v); STATE.drawerVault=v; }
  msg.textContent='saved ✓'; toast('Tags updated');
}

// ---------- EXPIRY ----------
let EXP = { days: 30, items: [], allItems: [], stats: null, scannedAt: 0, sort: 'daysLeft', dir: 1, scanned: false, polling: false };
const ROW_CAP = 500;
function summarize(items, days){
  const now=Date.now(), horizon=now+days*86400000;
  return items.filter(i=>Date.parse(i.expires)<=horizon).sort((a,b)=>a.daysLeft-b.daysLeft);
}
function applyStatusData(s){
  EXP.allItems = (s.allItems||s.items||[]).map(it=>({...it, env:(findVault(it.vault)?.env)||envOf(it.subscriptionId)}));
  EXP.stats=s.stats; EXP.scannedAt=s.scannedAt;
}
// Kick a background scan early so the dashboard's lifecycle cards fill in.
async function kickExpiryScan(){
  if(EXP.scanned || EXP.polling) return;
  const s = await api(`/api/expiring/status?days=365`);
  if(s.ok && s.running){ EXP.polling=true; pollExpiring(true); return; }
  if(s.ok && s.scannedAt){ EXP.scanned=true; applyStatusData({...s, allItems:s.items}); refreshCurrent(); return; }
  const start = await api('/api/expiring/scan',{method:'POST'});
  if(start.ok){ EXP.polling=true; pollExpiring(true); }
}
function viewExpiry(){
  $('#route').innerHTML = `
    <div class="row" style="margin-bottom:18px;justify-content:space-between">
      <div class="row">
        <span class="eyebrow">Window</span>
        <div class="seg" id="expWindow">
          <button data-d="7">7d</button><button data-d="30" class="active">30d</button>
          <button data-d="60">60d</button><button data-d="90">90d</button><button data-d="365">1y</button></div>
        <button class="btn" id="expScan">⟳ Scan vaults</button>
      </div>
      <span class="tablenote" id="expMeta"></span>
    </div>
    <div class="panel horizon hide" id="expHorizon"></div>
    <div class="cards" id="expCards"></div>
    <div class="panel"><div class="scroll"><table>
      <thead><tr>
        <th data-esort="daysLeft">Expires in</th><th data-esort="expires">Expiry date</th>
        <th data-esort="type">Type</th><th data-esort="name">Item</th>
        <th data-esort="vault">Vault</th><th data-esort="env">Env</th>
        <th>Status</th><th class="right">Actions</th>
      </tr></thead>
      <tbody id="expBody"><tr><td colspan="8" class="empty">Press <b>Scan vaults</b> to check expiry across every vault you can read.</td></tr></tbody>
    </table></div></div>
    <div class="tablenote" id="expTableNote"></div>`;
  $('#expWindow').querySelectorAll('button').forEach(b=>{ b.classList.toggle('active',+b.dataset.d===EXP.days);
    b.onclick=()=>{ $('#expWindow').querySelectorAll('button').forEach(x=>x.classList.toggle('active',x===b)); EXP.days=+b.dataset.d; renderExpiring(); }; });
  $('#expScan').onclick=()=>scanExpiring();
  document.querySelectorAll('th[data-esort]').forEach(th=>th.onclick=()=>{ const k=th.dataset.esort; EXP.dir=EXP.sort===k?-EXP.dir:1; EXP.sort=k; renderExpiring(); });
  if(EXP.polling){ $('#expScan').disabled=true; $('#expScan').textContent=`Scanning ${EXP._done||0}/${EXP._total||'…'}`; renderScanProgress(); }
  else if(!EXP.scanned){ scanExpiring(); }
  else { $('#expScan').textContent='⟳ Re-scan'; renderExpiring(); }
}
async function scanExpiring(){
  if(EXP.polling) return;
  const start = await api('/api/expiring/scan', {method:'POST'});
  if(!start.ok){ if($('#expBody'))$('#expBody').innerHTML = `<tr><td colspan="8" class="empty">${start.needLogin?'Not signed in — run az login, then Refresh.':esc(start.error||'failed')}</td></tr>`; return; }
  EXP.polling = true; if($('#expScan'))$('#expScan').disabled=true;
  pollExpiring();
}
function renderScanProgress(){
  if(STATE.route!=='expiry' || !$('#expBody')) return;
  const pct = EXP._total? Math.round(EXP._done/EXP._total*100):0;
  $('#expHorizon').classList.add('hide');
  $('#expBody').innerHTML = `<tr><td colspan="8" class="empty">
    <div class="spin"></div>
    <div style="margin-top:16px">Inspecting <b>${EXP._done||0}</b> of <b>${EXP._total||'…'}</b> vaults…</div>
    <div class="progress"><div class="bar" style="width:${pct}%"></div></div>
    <div class="faint mono" style="margin-top:10px;font-size:11px">Read-denied vaults skip instantly · only your readable vaults are inspected</div>
  </td></tr>`;
}
async function pollExpiring(silent){
  const s = await api(`/api/expiring/status?days=365`);
  if(!s.ok){ EXP.polling=false; if($('#expScan')){$('#expScan').disabled=false;} return; }
  EXP._done=s.done; EXP._total=s.total;
  if(s.running){
    if($('#expScan')) $('#expScan').textContent = `Scanning ${s.done}/${s.total}`;
    renderScanProgress();
    setTimeout(()=>pollExpiring(silent), 1500);
    return;
  }
  EXP.polling=false; EXP.scanned=true;
  applyStatusData({...s, allItems:s.items});
  if($('#expScan')){ $('#expScan').disabled=false; $('#expScan').textContent='⟳ Re-scan'; }
  refreshCurrent();
}
function expSorted(items){
  const k=EXP.sort, d=EXP.dir;
  return [...items].sort((a,b)=>{const av=k==='daysLeft'?a[k]:String(a[k]||''),bv=k==='daysLeft'?b[k]:String(b[k]||'');return (av>bv?1:av<bv?-1:0)*d;});
}
function renderExpiring(){
  if(STATE.route!=='expiry' || !$('#expCards')) return;
  const items = summarize(EXP.allItems, EXP.days);
  const expired = items.filter(i=>i.daysLeft<0).length;
  const soon = items.filter(i=>i.daysLeft>=0&&i.daysLeft<=7).length;
  const certs = items.filter(i=>i.type==='certificate').length;
  const when = EXP.scannedAt? new Date(EXP.scannedAt).toLocaleTimeString():'';
  $('#expMeta').textContent = EXP.stats? `${EXP.stats.readable} readable · ${EXP.stats.forbidden} denied · ${EXP.stats.total} vaults · scanned ${when}` : '';
  $('#expCards').innerHTML = [
    card('Flagged', items.length, `within ${EXP.days} days`, ''),
    card('Expired', expired, 'needs rotation', expired?'alert':''),
    card('≤ 7 days', soon, 'urgent', soon?'warn':''),
    card('Certificates', certs, (items.length-certs)+' secrets', 'azure'),
  ].join('');
  renderHorizon(items);
  if(!items.length){
    $('#expHorizon').classList.add('hide'); $('#expTableNote').textContent='';
    $('#expBody').innerHTML = `<tr><td colspan="8" class="empty">✓ Nothing expiring within ${EXP.days} days across the ${EXP.stats?EXP.stats.readable:0} vault(s) you can read.</td></tr>`;
    return;
  }
  const list = expSorted(items); const shown = list.slice(0, ROW_CAP);
  $('#expTableNote').textContent = list.length>ROW_CAP ? `Showing first ${ROW_CAP} of ${list.length} — narrow the window or sort to see the rest.` : '';
  $('#expBody').innerHTML = shown.map(i=>{
    const sev = i.daysLeft<0?'bad':i.daysLeft<=7?'bad':i.daysLeft<=30?'warn':'good';
    const label = i.daysLeft<0?`expired ${-i.daysLeft}d ago`:i.daysLeft===0?'today':`${i.daysLeft} days`;
    const status = i.daysLeft<0?'<span class="sev expired">EXPIRED</span>':i.daysLeft<=7?'<span class="sev urgent">URGENT</span>':'<span class="sev ok">OK</span>';
    return `<tr>
      <td><span class="dot" style="background:var(--${sev})"></span> <b>${label}</b></td>
      <td class="mono muted">${(i.expires||'').slice(0,10)}</td>
      <td class="mono">${i.type==='certificate'?'cert':'secret'}</td>
      <td class="mono">${esc(i.name)}${i.enabled?'':' <span class="pill">disabled</span>'}</td>
      <td class="mono muted">${esc(i.vault)}</td>
      <td><span class="tag ${envClass(i.env)}">${esc(i.env)}</span></td>
      <td>${status}</td>
      <td class="right"><button class="iconbtn" onclick="openVault('${esc(i.vault)}')">Open</button>
        <button class="iconbtn" onclick="copy('az keyvault ${i.type==='certificate'?'certificate':'secret'} show --vault-name ${esc(i.vault)} --name ${esc(i.name)} -o jsonc')">⧉</button></td>
    </tr>`;
  }).join('');
}
function renderHorizon(items){
  const el = $('#expHorizon'); if(!el) return;
  if(!items.length){ el.classList.add('hide'); el.innerHTML=''; return; }
  el.classList.remove('hide');
  const days = EXP.days;
  const expired = items.filter(i=>i.daysLeft<0);
  const future = items.filter(i=>i.daysLeft>=0);
  const markSets = {7:[0,1,3,5,7],30:[0,7,14,21,30],60:[0,15,30,45,60],90:[0,30,60,90],365:[0,90,180,270,365]};
  const marks = markSets[days] || [0, days];
  const grid = marks.map(m=>`<div class="hz-grid" style="left:${Math.min(99.5,m/days*100)}%"><span>${m===0?'now':'+'+m+'d'}</span></div>`).join('');
  const ticks = future.map(i=>{
    const left = Math.min(99.6, Math.max(.4, i.daysLeft/days*100));
    const sev = i.daysLeft<=7?'alert':i.daysLeft<=30?'warn':'ok';
    return `<div class="hz-tick ${sev}" style="left:${left}%" title="${esc(i.name)} · ${esc(i.vault)} · in ${i.daysLeft}d"></div>`;
  }).join('');
  const expTicks = expired.slice(0,140).map((i,idx,arr)=>{
    const left = arr.length>1 ? 8 + (idx/(arr.length-1))*84 : 50;
    return `<div class="hz-tick alert" style="left:${left}%" title="${esc(i.name)} · ${esc(i.vault)} · expired ${-i.daysLeft}d ago"></div>`;
  }).join('');
  el.innerHTML = `
    <div class="hz-head">
      <span class="eyebrow">Expiry horizon · next ${days} days</span>
      <div class="hz-legend">
        <span><i style="background:var(--alert)"></i>≤7d / expired</span>
        <span><i style="background:var(--warn)"></i>≤30d</span>
        <span><i style="background:var(--ok)"></i>beyond</span></div>
    </div>
    <div class="hz-body">
      <div class="hz-expired" title="${expired.length} already expired">
        <div class="hz-expired-n">${expired.length}</div><div class="hz-expired-l">EXPIRED</div>${expTicks}</div>
      <div class="hz-axis">${grid}${ticks}</div>
    </div>`;
}

// ---------- SETTINGS (account + subscriptions) ----------
function viewSettings(){
  const counts={}; STATE.vaults.forEach(v=>counts[v.subscriptionId]=(counts[v.subscriptionId]||0)+1);
  $('#route').innerHTML = `
    <div class="cards" style="margin-bottom:24px">
      ${card('Signed in as', '', STATE.account?STATE.account.user.name:'—','')}
      ${card('Tenant', (STATE.account&&STATE.account.tenantId||'').slice(0,8)+'…','active directory','')}
      ${card('Subscriptions', STATE.subs.length, STATE.subs.filter(s=>s.state==='Enabled').length+' enabled','azure')}
    </div>
    <div class="panel"><div class="scroll"><table>
      <thead><tr><th>Name</th><th>Env</th><th>State</th><th>Active</th><th class="right">Vaults</th><th>Subscription ID</th><th></th></tr></thead>
      <tbody>${STATE.subs.map(s=>`<tr>
        <td><b>${esc(s.name)}</b></td>
        <td><span class="tag ${envClass(SUBMETA[s.id].env)}">${esc(SUBMETA[s.id].env)}</span></td>
        <td>${esc(s.state)}</td>
        <td>${s.isDefault?'<span class="pill rbac">active</span>':''}</td>
        <td class="right mono">${counts[s.id]||0}</td>
        <td class="mono muted">${esc(s.id)}</td>
        <td class="right">${s.isDefault?'':`<button class="btn sm ghost" onclick="setSub('${esc(s.id)}')">Switch</button>`}</td>
      </tr>`).join('')}</tbody>
    </table></div></div>`;
}
async function setSub(id){
  toast('Switching subscription…');
  const r = await api('/api/subscription/set',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subscription:id})});
  if(r.ok){ STATE.account=r.data; $('#acctSub').textContent=r.data.name; await loadSubs(); refreshCurrent(); toast('Active subscription set'); } else toast(r.error||'failed');
}

function card(k,v,sub,mod){
  return `<div class="card ${mod?'card--'+mod:''}"><div class="k">${esc(k)}</div><div class="v">${v} <small>${esc(sub)}</small></div></div>`;
}

// ---------- command palette ----------
let CMDK = { open:false, items:[], cur:0 };
function cmdkActions(){
  return [
    {type:'view', label:'Dashboard', hint:'go', act:()=>navigate('dashboard')},
    {type:'view', label:'Key Vaults', hint:'go', act:()=>navigate('vaults')},
    {type:'view', label:'Expiry', hint:'go', act:()=>navigate('expiry')},
    {type:'view', label:'Account & subscriptions', hint:'go', act:()=>navigate('settings')},
    {type:'action', label:'Refresh inventory', hint:'run', act:()=>{ doRefresh(); }},
  ];
}
function openCmdk(){ CMDK.open=true; $('#cmdkOv').classList.add('show'); const i=$('#cmdkIn'); i.value=''; renderCmdk(''); i.focus(); }
function closeCmdk(){ CMDK.open=false; $('#cmdkOv').classList.remove('show'); }
function renderCmdk(q){
  q=q.toLowerCase().trim();
  const acts = cmdkActions().filter(a=>!q||a.label.toLowerCase().includes(q));
  const vaults = STATE.vaults
    .filter(v=>!q || v.name.toLowerCase().includes(q) || (v.service||'').toLowerCase().includes(q) || Object.values(v.tags||{}).join(' ').toLowerCase().includes(q))
    .slice(0,40)
    .map(v=>({type:'vault', label:v.name, sub:v.env, env:v.env, act:()=>openVault(v.name)}));
  CMDK.items = [...acts, ...vaults]; CMDK.cur=0;
  const list=$('#cmdkList');
  if(!CMDK.items.length){ list.innerHTML='<div class="cmdk-empty">No matches.</div>'; return; }
  const vIco='<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>';
  const gIco='<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M5 6h14M5 18h14"/></svg>';
  let html=''; let lastType='';
  CMDK.items.forEach((it,idx)=>{
    if(it.type!==lastType){ html+=`<div class="cmdk-sec">${it.type==='vault'?'Vaults':it.type==='view'?'Go to':'Actions'}</div>`; lastType=it.type; }
    html+=`<div class="cmdk-it ${idx===CMDK.cur?'cur':''}" data-i="${idx}">
      ${it.type==='vault'?vIco:gIco}
      <span class="lbl">${esc(it.label)}${it.sub?`<small>${esc(it.sub)}</small>`:''}</span>
      <span class="hint">${it.hint?esc(it.hint):'open'}</span></div>`;
  });
  list.innerHTML=html;
  list.querySelectorAll('.cmdk-it').forEach(el=>{
    el.onmousemove=()=>{ CMDK.cur=+el.dataset.i; markCur(); };
    el.onclick=()=>runCmdk(+el.dataset.i);
  });
}
function markCur(){ $('#cmdkList').querySelectorAll('.cmdk-it').forEach(el=>el.classList.toggle('cur',+el.dataset.i===CMDK.cur)); }
function moveCur(d){ if(!CMDK.items.length)return; CMDK.cur=(CMDK.cur+d+CMDK.items.length)%CMDK.items.length; markCur();
  const el=$('#cmdkList').querySelector('.cmdk-it.cur'); if(el) el.scrollIntoView({block:'nearest'}); }
function runCmdk(i){ const it=CMDK.items[i]; if(!it)return; closeCmdk(); it.act(); }

function doRefresh(){ toast('Refreshing…'); loadSubs().then(()=>loadVaults(true)).then(()=>{ EXP.scanned=false; EXP.polling=false; refreshCurrent(); kickExpiryScan(); }); }

// ---------- events ----------
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>navigate(b.dataset.view));
$('#refresh').onclick=doRefresh;
$('#acctBtn').onclick=()=>navigate('settings');
$('#cmdkBtn').onclick=openCmdk;
$('#search').oninput=e=>{ STATE.q=e.target.value; if(STATE.route!=='vaults'){ navigate('vaults'); } else { renderVaultRows(); } };
$('#cmdkIn').oninput=e=>renderCmdk(e.target.value);
$('#cmdkOv').onclick=e=>{ if(e.target===$('#cmdkOv')) closeCmdk(); };
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='k'){ e.preventDefault(); CMDK.open?closeCmdk():openCmdk(); return; }
  if(!CMDK.open){ if(e.key==='Escape' && STATE.route==='vault'){ navigate('vaults'); } return; }
  if(e.key==='Escape'){ closeCmdk(); }
  else if(e.key==='ArrowDown'){ e.preventDefault(); moveCur(1); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); moveCur(-1); }
  else if(e.key==='Enter'){ e.preventDefault(); runCmdk(CMDK.cur); }
});

boot();
</script>
